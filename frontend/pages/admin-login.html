<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - RR_SHOEES</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
    body { background: #0a0a0a; font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .input-dark { background: #1a1a1a; border: 1px solid #333; color: #fff; }
    .input-dark:focus { border-color: #d4af37; outline: none; }
    .btn-gold { background: linear-gradient(135deg, #c9a227, #d4af37); color: #0a0a0a; font-weight: 700; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,175,55,0.3); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">

  <div class="bg-[#111] border border-white/5 rounded-3xl p-10 max-w-md w-full">
    <div class="text-center mb-8">
      <div class="text-5xl mb-4">🔐</div>
      <h1 class="text-2xl font-bold font-display">RR<span class="text-[#d4af37]">_</span>SHOEES</h1>
      <p class="text-gray-400 text-sm mt-2">Painel Administrativo</p>
    </div>

    <form onsubmit="loginAdmin(event)" class="space-y-4">
      <div>
        <label class="text-xs text-gray-400 uppercase tracking-wider">Email</label>
        <input type="email" id="admin-email" required class="input-dark w-full px-4 py-3 rounded-lg mt-1" placeholder="admin@rrshoes.com.br" value="admin@rrshoes.com.br">
      </div>
      <div>
        <label class="text-xs text-gray-400 uppercase tracking-wider">Senha</label>
        <input type="password" id="admin-senha" required class="input-dark w-full px-4 py-3 rounded-lg mt-1" placeholder="••••••••" value="admin123">
      </div>
      <button type="submit" class="btn-gold w-full py-3 rounded-lg text-lg font-bold">
        <i class="fas fa-lock mr-2"></i> ACESSAR PAINEL
      </button>
    </form>

    <div id="login-msg" class="text-center text-sm mt-4"></div>
    
    <p class="text-center text-xs text-gray-600 mt-6">
      Use: admin@rrshoes.com.br / admin123
    </p>
    
    <a href="../index.html" class="block text-center text-xs text-gray-500 mt-4 hover:text-[#d4af37] transition">
      <i class="fas fa-arrow-left mr-1"></i> Voltar para loja
    </a>
  </div>

  <script>
    function loginAdmin(e) {
      e.preventDefault();
      const email = document.getElementById('admin-email').value;
      const senha = document.getElementById('admin-senha').value;
      const msg = document.getElementById('login-msg');

      // Credenciais do admin
      if (email === 'admin@rrshoes.com.br' && senha === 'admin123') {
        localStorage.setItem('rrshoes_admin_logado', 'true');
        msg.innerHTML = '<span class="text-green-400">✅ Acesso liberado!</span>';
        setTimeout(() => window.location.href = 'admin.html', 800);
      } else {
        msg.innerHTML = '<span class="text-red-400">❌ Email ou senha incorretos</span>';
      }
    }

    // Se já estiver logado, redirecionar
    if (localStorage.getItem('rrshoes_admin_logado') === 'true') {
      window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
